name: Build WN-Turnip Drivers

on:
  schedule:
    # Weekly on Wednesday 12:00 UTC (first run 2026-07-08).
    - cron: '0 12 * * 3'
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit SHA or branch to build & release"
        required: false
        default: main

# schedule + workflow_dispatch release (tag + GitHub release, version bumped);
# PR and push only build a preview. Release events serialize on build-release.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('build-pr-{0}', github.event.pull_request.number) || (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && 'build-release' || format('build-push-{0}', github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    outputs:
      build_version: ${{ steps.ver.outputs.build_version }}
      tag_name: ${{ steps.ver.outputs.tag_name }}
      release: ${{ steps.ver.outputs.release }}
      head_sha: ${{ steps.ver.outputs.head_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || inputs.ref || github.sha }}
          persist-credentials: false

      - name: Resolve build version
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch --tags --quiet
          head_sha=$(git rev-parse HEAD)
          echo "head_sha=${head_sha}" >> "$GITHUB_OUTPUT"

          # Next version = latest PUBLISHED v1.NN release + 1 (zero-padded, floor 1.03).
          latest=$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
                     --jq '.[] | select(.draft==false and .prerelease==false) | .tag_name' 2>/dev/null \
                   | grep -E '^v1\.[0-9]{2}$' | sort -V | tail -n1 | sed 's/^v//' || true)
          if [ -z "${latest:-}" ]; then
            next_base="1.03"
          else
            n=$((10#${latest#1.}))
            next_base=$(printf '1.%02d' "$((n + 1))")
          fi

          case "${{ github.event_name }}" in
            pull_request)
              build_ver="${next_base}-PR${{ github.event.pull_request.number }}"
              echo "release=false" >> "$GITHUB_OUTPUT"
              ;;
            push)
              build_ver="${next_base}"
              echo "release=false" >> "$GITHUB_OUTPUT"
              ;;
            schedule|workflow_dispatch)
              if git rev-parse "v${next_base}" >/dev/null 2>&1; then
                echo "::error::Tag v${next_base} already exists; refusing to release the same version twice."
                exit 1
              fi
              build_ver="${next_base}"
              echo "release=true" >> "$GITHUB_OUTPUT"
              echo "tag_name=v${next_base}" >> "$GITHUB_OUTPUT"
              ;;
          esac
          echo "build_version=${build_ver}" >> "$GITHUB_OUTPUT"
          echo "Resolved build version: ${build_ver} (event=${{ github.event_name }})"

      - name: Install host build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ninja-build patchelf unzip curl python3-pip flex bison zip \
            glslang-tools ccache
          # Mesa main requires meson >= 1.4; Ubuntu 24.04 apt only ships 1.3.2.
          sudo python3 -m pip install --quiet --break-system-packages "meson>=1.4" mako
          meson --version

      - name: Set up Android NDK r26d
        id: ndk
        # nttld/setup-ndk v1.5.0
        uses: nttld/setup-ndk@afb4c9964b521afb97c864b7d40b11e6911bd410
        with:
          ndk-version: r26d
          add-to-path: false
          local-cache: true

      - name: Build -b and -p variants
        env:
          BUILD_VERSION: ${{ steps.ver.outputs.build_version }}
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: ./build_wn_turnip.sh

      - name: Verify output zips exist
        run: |
          ls -lh "WN-Turnip-${{ steps.ver.outputs.build_version }}-b_Axxx.zip" \
                  "WN-Turnip-${{ steps.ver.outputs.build_version }}-p_Axxx.zip"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WN-Turnip-${{ steps.ver.outputs.build_version }}
          path: |
            WN-Turnip-${{ steps.ver.outputs.build_version }}-b_Axxx.zip
            WN-Turnip-${{ steps.ver.outputs.build_version }}-p_Axxx.zip
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    if: (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && needs.build.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: WN-Turnip-${{ needs.build.outputs.build_version }}

      - name: Create GitHub Release
        # softprops/action-gh-release v2.0.8
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191
        with:
          tag_name: ${{ needs.build.outputs.tag_name }}
          name: WN-Turnip ${{ needs.build.outputs.build_version }}
          target_commitish: ${{ needs.build.outputs.head_sha }}
          files: |
            WN-Turnip-${{ needs.build.outputs.build_version }}-b_Axxx.zip
            WN-Turnip-${{ needs.build.outputs.build_version }}-p_Axxx.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          make_latest: false
